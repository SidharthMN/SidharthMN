<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SIDXOID — Sidharth M N</title>
<desc>ASCII banner card for Sidharth M N, AI Engineer and Computer Vision developer</desc>

<defs>
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    .ascii { font-size: 12.5px; fill: #a78bfa; }
    .prompt-sym { font-size: 12px; fill: #534AB7; }
    .typed { font-size: 12px; fill: #c4b5fd; }
    .meta-key { font-size: 12px; fill: #534AB7; }
    .meta-val { font-size: 12px; fill: #c4b5fd; }
    .meta-green { font-size: 12px; fill: #5dca9a; }
    .stat-num { font-size: 18px; font-weight: 500; fill: #a78bfa; }
    .stat-lbl { font-size: 10.5px; fill: #534AB7; }
    .tag-text { font-size: 10.5px; fill: #a78bfa; }
    .tag-text-active { font-size: 10.5px; fill: #c4b5fd; }
    .link-text { font-size: 11px; fill: #8b7dd8; }
    .footer-text { font-size: 10.5px; fill: #3d2e6b; }
    .cursor-rect { fill: #a78bfa; animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</defs>

